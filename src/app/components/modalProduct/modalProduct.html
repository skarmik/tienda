<div
*ngIf="visible"
class="fixed inset-0 z-50
flex items-center justify-center
bg-black/60 backdrop-blur-sm
animate-fadeIn">

    <!-- Modal -->

    <div
    class="w-full max-w-2xl
    bg-[#151922]
    border border-slate-800
    rounded-3xl
    shadow-[0_0_40px_rgba(0,0,0,.45)]
    overflow-hidden
    animate-scaleIn">

        <!-- Header -->

        <div class="flex items-center justify-between p-6 border-b border-slate-800">

            <div>

                <h2 class="text-2xl font-semibold text-white">
                    Agregar Producto
                </h2>

                <p class="text-sm text-gray-500 mt-1">
                    Completa la información del producto
                </p>

            </div>

            <button
            (click)="cerrarModal()"
            class="w-10 h-10
            rounded-xl
            bg-slate-800
            hover:bg-red-500/20
            hover:text-red-400
            transition-all duration-300">

                ✕

            </button>

        </div>


        <!-- Formulario -->

        <form class="p-6 space-y-6">

            <div>

                <label class="block text-sm text-gray-400 mb-2">
                    Nombre del producto
                </label>

                <input
                type="text"
                placeholder="Producto..."
                class="w-full
                bg-[#1d2330]
                border border-slate-700
                rounded-xl
                px-4 py-3
                text-white
                focus:outline-none
                focus:border-cyan-400">

            </div>


            <div class="grid md:grid-cols-2 gap-6">

                <div>

                    <label class="block text-sm text-gray-400 mb-2">
                        Precio
                    </label>

                    <input
                    type="number"
                    placeholder="$0.00"
                    class="w-full
                    bg-[#1d2330]
                    border border-slate-700
                    rounded-xl
                    px-4 py-3
                    text-white
                    focus:outline-none
                    focus:border-cyan-400">

                </div>


                <div>

                    <label class="block text-sm text-gray-400 mb-2">
                        Stock
                    </label>

                    <input
                    type="number"
                    placeholder="0"
                    class="w-full
                    bg-[#1d2330]
                    border border-slate-700
                    rounded-xl
                    px-4 py-3
                    text-white
                    focus:outline-none
                    focus:border-cyan-400">

                </div>

            </div>


            <!-- Footer -->

            <div class="flex justify-end gap-4 pt-4">

                <button
                type="button"
                (click)="cerrarModal()"
                class="px-5 py-3
                rounded-xl
                border border-slate-700
                text-gray-300
                hover:bg-slate-800">

                    Cancelar

                </button>


                <button
                type="submit"
                class="px-6 py-3
                rounded-xl
                bg-gradient-to-r
                from-indigo-600
                to-cyan-500
                font-medium
                hover:scale-105
                transition-all duration-300">

                    Guardar

                </button>

            </div>

        </form>

    </div>

</div>
